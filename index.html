<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akshay Rajan</title>
  <link rel="stylesheet" href="style.css">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Kaushan+Script&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Tangerine:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
  <link rel="shortcut icon" href="static/favicon.svg" type="image/x-icon">
</head>
<body>
  <main>
    <div class="main">
      <div class="dp">
        <img src="static/dp.jpg" alt="dp" id="dp">
      </div>      
      <div class="name-container">
        <div class="namediv">
          <div class="namehead">
             Hey, I'm 
          </div>
          <div class="name">
            Akshay R
          </div>
          <div class="skills">

          </div>
        </div>
      </div>
    </div>
    <div class="buttons">
      <button class="btn btn-dark profile">Profile</button>
      <button class="btn btn-dark portfolio">Portfolio</button>
    </div>
  </main>
  <script>
    function animateSkills() {
      let skillsDiv = document.querySelector('.skills');
      let skills = ['Django', 'JavaScript', 'Flask', 'HTML', 'CSS', 'Bootstrap', 'React','SQL', 'Python', 'C++', 'Java', 'Git', 'GitHub', 'Linux', 'Selenium', 'BeautifuSoup'];
      let index = 0;

      function addSkill() {
          let currentSkill = document.createElement('div');
          currentSkill.classList.add('skill');
          currentSkill.innerText = skills[index % skills.length];
          currentSkill.style.animation = `fadeInOut 2s ease-in-out forwards`;
          skillsDiv.appendChild(currentSkill);

          currentSkill.addEventListener('animationend', () => {
              setTimeout(() => {
                  skillsDiv.removeChild(currentSkill);
                  index++;
                  addSkill();
              }, 1000); // Wait for 1 second after animation ends
          });
      }
      addSkill();
    };

    document.addEventListener('DOMContentLoaded', () => {
      document.querySelector('.main').style.opacity = 1;
      animateSkills();
    });
  </script>
</body>
</html>
