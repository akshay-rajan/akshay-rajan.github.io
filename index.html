<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akshay Rajan</title>
  <link rel="stylesheet" href="style.css">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Kaushan+Script&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Tangerine:wght@400;700&display=swap" rel="stylesheet">
  <link rel="shortcut icon" href="favicon.svg" type="image/x-icon">
</head>
<body>
  <main>
    <div class="main">
      <div class="dp">
        <img src="static/dp.jpg" alt="dp">
      </div>
      <div class="name-container">
        <div class="namediv">
          <div class="namehead">
             Hey, I'm 
          </div>
          <div class="name">
            Akshay R
          </div>
          <div class="skills">
            <div class="skill">Web Developer</div>
            <div class="skill">Django</div>
            <div class="skill">JavaScript</div>
          </div>
        </div>
      </div>
    </div>
    <div class="buttons">
      <button class="profile">Profile</button>
      <button class="portfolio">Portfolio</button>
    </div>
  </main>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // For title
      document.querySelector('.main').style.opacity = 1;

      // For skills
      let skills = document.querySelectorAll('.skill');
      let currentIndex = 0;
        
      function animateBox(skill) {
        skill.style.animation = 'fadeInOut 2s ease forwards';
      }
      function resetAnimation(skill) {
        skill.style.animation = 'none';
        void skill.offsetHeight;
        skill.style.animation = 'fadeInOut 2s ease forwards';
      }
      function animateAll() {
        let currentIndex = 0;

        function animateNext() {
          resetAnimation(skills[currentIndex]);
          currentIndex = (currentIndex + 1) % skills.length;
        }

        function resetAnimation(skill) {
          skill.style.animation = 'none';
          void skill.offsetHeight;
          skill.style.animation = 'fadeInOut 2s ease forwards';
        }

        setInterval(() => {
          animateBox(skills[0]);
          setTimeout(() => animateBox(skills[1]), 2000);
          setTimeout(() => animateBox(skills[2]), 4000);
        }, 6000); // Total animation duration (fade in + fade out)
      }

      animateAll();
      
    });    
  </script>
</body>
</html>
